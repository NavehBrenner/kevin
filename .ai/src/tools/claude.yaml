targets:
  agents:
    dest: "CLAUDE.md"
  rules:
    dest: ".claude/rules"
  skills:
    dest: ".claude/skills"
  commands:
    dest: ".claude/commands"
  subagents:
    dest: ".claude/agents"

post_sync: "if [ -d code ]; then cp CLAUDE.md code/CLAUDE.md && mkdir -p code/.claude && cp -r .claude/* code/.claude/ 2>/dev/null; else cp CLAUDE.md ../CLAUDE.md && mkdir -p ../.claude && cp -r .claude/* ../.claude/ 2>/dev/null; fi || true"
